name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4.1.7
    
    - name: Set up Python
      uses: actions/setup-python@v5.1.0
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install kivy
        pip install flask werkzeug requests qrcode pillow
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          python3-openssl \
          openjdk-11-jdk \
          build-essential \
          libffi-dev \
          wget \
          unzip
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools platforms;android-31 build-tools;31.0.0 ndk;23.1.7779620'
        accept-android-sdk-licenses: true
        log-accepted-android-sdk-licenses: false
    
    - name: Build APK with Buildozer
      run: |
        cd ${{ github.workspace }}
        buildozer android debug
    
    - name: List build output
      run: |
        echo "Checking for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "Checking buildozer output directories..."
        ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"
        ls -la bin/ 2>/dev/null || echo "No bin directory"
      continue-on-error: true
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4.3.6
      with:
        name: apk-debug
        path: |
          .buildozer/android/platform/build-*/dist/*.apk
          bin/*.apk
          *.apk
        if-no-files-found: warn
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1.1.4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./bin/*.apk
        asset_name: lanfileshare.apk
        asset_content_type: application/octet-stream
      continue-on-error: true
