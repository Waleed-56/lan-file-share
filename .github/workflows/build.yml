name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false
    
    steps:
    - uses: actions/checkout@v4.2.2
    
    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install kivy
        pip install flask werkzeug requests qrcode pillow
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          python3-openssl \
          openjdk-11-jdk \
          build-essential \
          libffi-dev \
          wget \
          unzip
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platform-tools
          platforms;android-34
          build-tools;34.0.0
          cmdline-tools;latest
        accept-android-sdk-licenses: true
        log-accepted-android-sdk-licenses: false
    
    - name: Install AIDL explicitly
      run: |
        # Try to install AIDL if not included in build-tools
        echo "Installing AIDL..."
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install 'build-tools;34.0.0' > /dev/null 2>&1 || true
        # Make sure AIDL is executable
        find $ANDROID_SDK_ROOT -name "aidl" -type f -exec chmod +x {} \; 2>/dev/null || true
    
    - name: Verify Android SDK
      run: |
        echo "=== ANDROID ENVIRONMENT ==="
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "PATH includes Android: $(echo $PATH | grep -o "$ANDROID_SDK_ROOT" | wc -l) paths"
        
        echo "=== AIDL CHECK ==="
        echo "Checking for AIDL in PATH..."
        which aidl || echo "❌ AIDL not found in PATH"
        
        echo "Checking build-tools directory..."
        ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "❌ No build-tools directory"
        
        echo "Finding AIDL binary..."
        find $ANDROID_SDK_ROOT -name "aidl" -type f 2>/dev/null | head -5 || echo "❌ AIDL binary not found"
        
        echo "Checking AIDL version..."
        aidl --version 2>/dev/null || echo "❌ Cannot run aidl --version"
    
    - name: Build APK with Buildozer
      run: |
        cd ${{ github.workspace }}
        echo "Starting buildozer with Android SDK at: $ANDROID_SDK_ROOT"
        buildozer android debug
    
    - name: List build output
      run: |
        echo "Checking for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "Checking buildozer output directories..."
        ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"
        ls -la bin/ 2>/dev/null || echo "No bin directory"
      continue-on-error: true
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4.4.3
      with:
        name: apk-debug
        path: |
          .buildozer/android/platform/build-*/dist/*.apk
          bin/*.apk
          *.apk
        if-no-files-found: warn
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1.1.4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./bin/*.apk
        asset_name: lanfileshare.apk
        asset_content_type: application/octet-stream
      continue-on-error: true
