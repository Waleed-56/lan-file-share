name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4.2.0
    
    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install kivy
        pip install flask werkzeug requests qrcode pillow
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          python3-openssl \
          openjdk-11-jdk \
          build-essential \
          libffi-dev \
          wget \
          unzip
    
    - name: Setup Android SDK
      run: |
        # Install Android SDK manually
        ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME
        
        # Download command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip
        mkdir -p $ANDROID_HOME/cmdline-tools/latest
        mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ 2>/dev/null || true
        
        # Set up environment
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        # Accept licenses and install components
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install 'platform-tools' 'platforms;android-31' 'build-tools;31.0.0' > /dev/null 2>&1
        
        # Export for subsequent steps
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
        echo "$ANDROID_HOME/build-tools/31.0.0" >> $GITHUB_PATH
    
    - name: Build APK with Buildozer
      run: |
        cd ${{ github.workspace }}
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        buildozer android debug
    
    - name: List build output
      run: |
        echo "Checking for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "Checking buildozer output directories..."
        ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"
        ls -la bin/ 2>/dev/null || echo "No bin directory"
      continue-on-error: true
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4.4.0
      with:
        name: apk-debug
        path: |
          .buildozer/android/platform/build-*/dist/*.apk
          bin/*.apk
          *.apk
        if-no-files-found: warn
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1.1.4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./bin/*.apk
        asset_name: lanfileshare.apk
        asset_content_type: application/octet-stream
      continue-on-error: true
