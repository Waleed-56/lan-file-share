name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false
    
    steps:
    - uses: actions/checkout@v4.2.2
    
    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        pip install kivy
        pip install flask werkzeug requests qrcode pillow
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          python3-openssl \
          openjdk-11-jdk \
          build-essential \
          libffi-dev \
          wget \
          unzip
    
    - name: Setup Android SDK Manually
      run: |
        echo "=== Setting up Android SDK manually ==="
        
        # Create Android SDK directory
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        mkdir -p $ANDROID_HOME
        
        # Download latest command line tools
        echo "Downloading Android SDK command line tools..."
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip
        mkdir -p $ANDROID_HOME/cmdline-tools/latest
        mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ 2>/dev/null || true
        
        # Set PATH
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/34.0.0
        
        # Accept licenses
        echo "Accepting Android SDK licenses..."
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
        
        # Install required components
        echo "Installing Android SDK components..."
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
          'platform-tools' \
          'platforms;android-34' \
          'build-tools;34.0.0' \
          'cmdline-tools;latest' > /dev/null 2>&1
        
        # Make sure AIDL is executable
        find $ANDROID_HOME -name "aidl" -type f -exec chmod +x {} \; 2>/dev/null || true
        
        # Export environment variables
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
        echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
        
        echo "Android SDK setup complete!"
    
    - name: Verify Android SDK
      run: |
        echo "=== ANDROID ENVIRONMENT ==="
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "PATH includes Android: $(echo $PATH | grep -o "$ANDROID_SDK_ROOT" | wc -l) paths"
        
        echo "=== AIDL CHECK ==="
        echo "Checking for AIDL in PATH..."
        which aidl || echo "❌ AIDL not found in PATH"
        
        echo "Checking build-tools directory..."
        ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "❌ No build-tools directory"
        
        echo "Finding AIDL binary..."
        find $ANDROID_SDK_ROOT -name "aidl" -type f 2>/dev/null | head -5 || echo "❌ AIDL binary not found"
        
        echo "Checking AIDL version..."
        aidl --version 2>/dev/null || echo "❌ Cannot run aidl --version"
        
        echo "=== SDK COMPONENTS ==="
        echo "Available platforms:"
        ls -la $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || echo "No platforms"
        echo "Available build-tools:"
        ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "No build-tools"
    
    - name: Build APK with Buildozer
      run: |
        cd ${{ github.workspace }}
        echo "Starting buildozer with Android SDK at: $ANDROID_SDK_ROOT"
        buildozer android debug
    
    - name: List build output
      run: |
        echo "Checking for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "Checking buildozer output directories..."
        ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"
        ls -la bin/ 2>/dev/null || echo "No bin directory"
      continue-on-error: true
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4.4.3
      with:
        name: apk-debug
        path: |
          .buildozer/android/platform/build-*/dist/*.apk
          bin/*.apk
          *.apk
        if-no-files-found: warn
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1.1.4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./bin/*.apk
        asset_name: lanfileshare.apk
        asset_content_type: application/octet-stream
      continue-on-error: true
