name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # This stops the Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          libunwind-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          cmake \
          gettext \
          libtinfo6 \
          libstdc++6

    - name: Install Buildozer and Cython
      run: |
        python -m pip install --upgrade pip
        pip install "buildozer>=1.5.0" "cython<3.0.0"

    - name: Build with Buildozer
      run: |
        # Verbose mode to see any Python-for-Android issues
        buildozer android debug
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lan-file-share-apk
        path: bin/*.apk
